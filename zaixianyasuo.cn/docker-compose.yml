# ImageCompressor
# 启动: docker compose up -d
# 停止: docker compose down

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imgcompress
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ""
      CORS_ORIGINS: "*"
      UPLOAD_DIR: /app/storage/uploads
      COMPRESS_DIR: /app/storage/compressed
      MAX_UPLOAD_SIZE_MB: "20"
      MAX_VIDEO_UPLOAD_SIZE_MB: "200"
      CONCURRENCY: "4"
    volumes:
      - uploads_data:/app/storage/uploads
      - compressed_data:/app/storage/compressed

volumes:
  uploads_data:
  compressed_data:
